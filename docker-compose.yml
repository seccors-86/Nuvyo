services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: central_atividades
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/migrations/schema_complete.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro
      - ./backend/src/migrations/seed_minimal.sql:/docker-entrypoint-initdb.d/002-seed.sql:ro
      - ./backend/src/migrations/schema_evolution.sql:/docker-entrypoint-initdb.d/003-evolution.sql:ro
      - ./backend/src/migrations/add_project_kpi_links.sql:/docker-entrypoint-initdb.d/004-project-kpi-links.sql:ro
      - ./backend/src/migrations/add_password_recovery.sql:/docker-entrypoint-initdb.d/005-password-recovery.sql:ro
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5437}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d central_atividades"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: central_atividades
      DB_USER: postgres
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      MFA_ENCRYPTION_KEY: ${MFA_ENCRYPTION_KEY}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8088}
      BOOTSTRAP_ADMIN_LOGIN: ${BOOTSTRAP_ADMIN_LOGIN}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD}
      DEMO_USERS_ENABLED: ${DEMO_USERS_ENABLED:-false}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_REQUIRE_TLS: ${SMTP_REQUIRE_TLS:-true}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
      PORT: 3001
      NODE_ENV: production
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:8088}
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3001/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 10

  frontend:
    build:
      context: .
      args:
        VITE_BASE_PATH: /
        VITE_API_URL: /api
    restart: unless-stopped
    ports:
      - "127.0.0.1:${APP_PORT:-8088}:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
  uploads_data:
