services:
  postgres:
    volumes:
      - ./backend/src/migrations/seed_demo.sql:/docker-entrypoint-initdb.d/006-demo.sql:ro

  backend:
    environment:
      NODE_ENV: development
      DEMO_USERS_ENABLED: "true"
      FRONTEND_URL: ${DEMO_FRONTEND_URL:-http://localhost:8088}
      CORS_ORIGINS: ${DEMO_FRONTEND_URL:-http://localhost:8088}
